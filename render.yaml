databases:
  - name: purpose-in-pain-db
    plan: free
    databaseName: purpose_in_pain
    user: purpose_in_pain

services:
  # Single monolith web service: builds the React frontend and the Express
  # backend in one pass, then the backend serves the built frontend as
  # static files (see backend/src/index.ts) alongside the /api routes.
  # Chosen over a 2-service split (separate static site) to fit inside a
  # free-tier account's limited build-pipeline minutes.
  - type: web
    name: purpose-in-pain
    runtime: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install && npm run build
    startCommand: cd backend && npm run migrate && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: purpose-in-pain-db
          property: connectionString
      - key: DB_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      # Preview-only default — change this in the Render dashboard
      # (Environment tab) once real content review begins.
      - key: ADMIN_PASSWORD
        value: PreviewPIP2026!
      - key: PAYSTACK_SECRET_KEY
        value: sk_test_placeholder
      - key: PAYSTACK_CURRENCY
        value: GBP
      - key: SEED_ON_MIGRATE
        value: "true"
      # Same-origin monolith: frontend and API are served from the same
      # host, so no cross-origin requests happen and this is mostly moot —
      # kept in sync with the render-assigned URL for completeness/safety.
      - key: ALLOWED_ORIGINS
        value: https://purpose-in-pain.onrender.com
